<!DOCTYPE html>
<html lang="en">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
    const SUPABASE_URL = "https://wdsdvumxzquyutyjukif.supabase.co";
    const SUPABASE_KEY = "sb_publishable_MuWa2m4uHAnM6WIoDVtR1g_KmAyLrYT";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY );

    
    (async () => {
        const { data } = await supabaseClient.auth.getSession();
        if (data.session) {
            window.location.href = 'index.html';
        }
    })();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEO Tracker - Login</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23065f46'/%3E%3Cpath d='M28 68 L28 50 L40 50 L40 68 M46 68 L46 38 L58 38 L58 68 M64 68 L64 28 L76 28 L76 68' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='76' cy='24' r='7' fill='%23f97316'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#065f46 0%,#047857 50%,#065f46 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
.logo-mark{width:38px;height:38px;flex-shrink:0;}
.logo-mark svg{width:100%;height:100%;display:block;}
.logo-text{font-size:19px;font-weight:800;color:#0f172a;}
.logo-text span{color:#065f46;}
h1{font-size:22px;font-weight:700;text-align:center;color:#0f172a;margin-bottom:6px;}
.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:26px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:0.6px;}
.field input{padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;background:#f8fafc;}
.field input:focus{outline:none;border-color:#065f46;background:white;box-shadow:0 0 0 3px rgba(6,95,70,0.08);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#065f46,#047857);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(6,95,70,0.3);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.switch{text-align:center;margin-top:18px;font-size:13px;color:#64748b;}
.switch a{color:#065f46;font-weight:700;cursor:pointer;text-decoration:none;}
.msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:#fee2e2;color:#dc2626;display:block;}
.msg.success{background:#dcfce7;color:#15803d;display:block;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 100 100"><rect width="100" height="100" rx="24" fill="url(#logoGrad2)"/><path d="M28 68 L28 50 L40 50 L40 68 M46 68 L46 38 L58 38 L58 68 M64 68 L64 28 L76 28 L76 68" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="76" cy="24" r="7" fill="#f97316"/><defs><linearGradient id="logoGrad2" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#065f46"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs></svg></div>
    <span class="logo-text">AEO <span>Tracker</span></span>
  </div>

  <div id="msg" class="msg"></div>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <h1>Welcome back</h1>
    <p class="sub">Login to check your AI search visibility</p>
    <div class="field"><label>Email</label><input type="email" id="login-email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="login-password" placeholder="••••••••"/></div>
    <button class="btn" id="loginBtn" onclick="login()">Log In</button>
    <div class="switch">Don't have an account? <a onclick="showSignup()">Sign up</a></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <h1>Create your account</h1>
    <p class="sub">Start tracking your AI search visibility</p>
    <div class="field"><label>Email</label><input type="email" id="signup-email" placeholder="you@example.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="signup-password" placeholder="Min 6 characters"/></div>
    <button class="btn" id="signupBtn" onclick="signup()">Sign Up</button>
    <div class="switch">Already have an account? <a onclick="showLogin()">Log in</a></div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wdsdvumxzquyutyjukif.supabase.co";
const SUPABASE_KEY = "sb_publishable_MuWa2m4uHAnM6WIoDVtR1g_KmAyLrYT";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.className = 'msg ' + type;
  m.textContent = text;
}

function showSignup() {
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('signupForm').style.display = 'block';
  document.getElementById('msg').className = 'msg';
}

function showLogin() {
  document.getElementById('signupForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('msg').className = 'msg';
}

async function signup() {
  const email = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!email || !password) { showMsg('Please fill all fields', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

  const btn = document.getElementById('signupBtn');
  btn.disabled = true; btn.textContent = 'Creating account...';

  const { data, error } = await supabaseClient.auth.signUp({ email, password });

  btn.disabled = false; btn.textContent = 'Sign Up';

  if (error) {
    showMsg(error.message, 'error');
  } else {
    showMsg('Account created! You can now log in.', 'success');
    setTimeout(showLogin, 1500);
  }
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) { showMsg('Please fill all fields', 'error'); return; }

  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in...';

  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

  btn.disabled = false; btn.textContent = 'Log In';

  if (error) {
    showMsg(error.message, 'error');
  } else {
    localStorage.setItem('sb-token', data.session.access_token);
    localStorage.setItem('sb-user-email', data.user.email);
    window.location.href = '/index.html';
  }
}

// If already logged in, redirect to tool
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (data.session) {
    window.location.href = '/index.html';
  }
})();
</script>
</body>
</html>
