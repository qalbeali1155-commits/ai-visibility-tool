<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEO Tracker - Reset Password</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23065f46'/%3E%3Cpath d='M28 68 L28 50 L40 50 L40 68 M46 68 L46 38 L58 38 L58 68 M64 68 L64 28 L76 28 L76 68' stroke='white' stroke-width='8' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3Ccircle cx='76' cy='24' r='7' fill='%23f97316'/%3E%3C/svg%3E">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#065f46 0%,#047857 50%,#065f46 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:white;border-radius:20px;padding:36px 32px;max-width:400px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,0.3);}
.logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:24px;}
.logo-mark{width:38px;height:38px;flex-shrink:0;}
.logo-mark svg{width:100%;height:100%;display:block;}
.logo-text{font-size:19px;font-weight:800;color:#0f172a;}
.logo-text span{color:#065f46;}
h1{font-size:22px;font-weight:700;text-align:center;color:#0f172a;margin-bottom:6px;}
.sub{text-align:center;color:#64748b;font-size:13px;margin-bottom:26px;line-height:1.5;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.field label{font-size:11px;font-weight:700;color:#065f46;text-transform:uppercase;letter-spacing:0.6px;}
.field input{padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:14px;font-family:'Inter',sans-serif;background:#f8fafc;}
.field input:focus{outline:none;border-color:#065f46;background:white;box-shadow:0 0 0 3px rgba(6,95,70,0.08);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,#065f46,#047857);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(6,95,70,0.3);}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.msg{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;line-height:1.5;}
.msg.error{background:#fee2e2;color:#dc2626;display:block;}
.msg.success{background:#dcfce7;color:#15803d;display:block;}
.success-icon{width:64px;height:64px;background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#065f46;margin:0 auto 20px;}
.switch{text-align:center;margin-top:18px;font-size:13px;color:#64748b;}
.switch a{color:#065f46;font-weight:700;cursor:pointer;text-decoration:none;}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark"><svg viewBox="0 0 100 100"><rect width="100" height="100" rx="24" fill="url(#logoGradR)"/><path d="M28 68 L28 50 L40 50 L40 68 M46 68 L46 38 L58 38 L58 68 M64 68 L64 28 L76 28 L76 68" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="76" cy="24" r="7" fill="#f97316"/><defs><linearGradient id="logoGradR" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stop-color="#065f46"/><stop offset="100%" stop-color="#059669"/></linearGradient></defs></svg></div>
    <span class="logo-text">AEO <span>Tracker</span></span>
  </div>

  <div id="msg" class="msg"></div>

  <div id="resetFormWrap">
    <h1>Set a new password</h1>
    <p class="sub">Choose a new password for your account</p>
    <div class="field"><label>New Password</label><input type="password" id="new-password" placeholder="Min 6 characters"/></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirm-password" placeholder="Re-enter password"/></div>
    <button class="btn" id="resetBtn" onclick="doReset()">Update Password</button>
  </div>

  <div id="doneWrap" style="display:none;text-align:center;">
    <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
    <h1>Password updated!</h1>
    <p class="sub">You can now log in with your new password.</p>
    <a class="switch" href="/login.html" style="display:block;"><b style="color:#065f46;">Go to Log In →</b></a>
  </div>
</div>

<script>
const SUPABASE_URL = "https://wdsdvumxzquyutyjukif.supabase.co";
const SUPABASE_KEY = "sb_publishable_MuWa2m4uHAnM6WIoDVtR1g_KmAyLrYT";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.className = 'msg ' + type;
  m.textContent = text;
}

async function doReset() {
  const pw1 = document.getElementById('new-password').value;
  const pw2 = document.getElementById('confirm-password').value;
  if (!pw1 || !pw2) { showMsg('Please fill both fields', 'error'); return; }
  if (pw1.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }
  if (pw1 !== pw2) { showMsg('Passwords do not match', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.disabled = true; btn.textContent = 'Updating...';

  const { error } = await supabaseClient.auth.updateUser({ password: pw1 });

  btn.disabled = false; btn.textContent = 'Update Password';

  if (error) {
    showMsg(error.message, 'error');
  } else {
    document.getElementById('resetFormWrap').style.display = 'none';
    document.getElementById('doneWrap').style.display = 'block';
  }
}

// Supabase puts the recovery token in the URL hash and creates a session automatically.
// If there's no session at all, the link was invalid/expired.
(async () => {
  const { data } = await supabaseClient.auth.getSession();
  if (!data.session) {
    showMsg('This reset link is invalid or has expired. Please request a new one from the login page.', 'error');
    document.getElementById('resetFormWrap').style.display = 'none';
  }
})();
</script>
</body>
</html>
